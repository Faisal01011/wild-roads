<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wild Roads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-bg"></div>
      <div class="loading-content">
        <h1 class="loading-title">WILD<span>ROADS</span></h1>
        <p class="loading-tagline">Hunt&nbsp;&nbsp;·&nbsp;&nbsp;Grow&nbsp;&nbsp;·&nbsp;&nbsp;Survive</p>
        <div class="loading-trail">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="loading-status">Entering the wild...</p>
      </div>
    </div>

    <div id="hud-top">
      <div class="hud-panel">
        <span class="hud-icon">◆</span>
        <div class="hud-text">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score-value">0</span>
        </div>
      </div>
    </div>

    <div id="hud-bottom">
      <div class="hud-panel stamina-panel">
        <span class="hud-label">Stamina</span>
        <div id="stamina-bar-container">
          <div id="stamina-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="touch-controls">
      <button id="btn-left" class="touch-btn" aria-label="Turn left">‹</button>
      <button id="btn-boost" class="touch-btn touch-btn-boost" aria-label="Boost">⚡</button>
      <button id="btn-right" class="touch-btn" aria-label="Turn right">›</button>
    </div>

    <div id="hud-stats">
      <div class="stat-row"><span class="stat-label">Distance</span><span class="stat-value" id="distance-value">0m</span></div>
      <div class="stat-row"><span class="stat-label">Eaten</span><span class="stat-value" id="eaten-value">0</span></div>
      <div class="stat-row"><span class="stat-label">Best</span><span class="stat-value" id="best-value">0</span></div>
    </div>

    <div id="main-menu">
      <div class="menu-bg"></div>
      <div class="menu-content">
        <h1 class="menu-title">WILD<span>ROADS</span></h1>

        <div class="menu-panel" id="menu-panel-main">
          <button class="menu-btn menu-btn-hidden" id="btn-resume">Resume</button>
          <button class="menu-btn" id="btn-play">Play</button>
          <button class="menu-btn menu-btn-secondary" id="btn-options">Options</button>
        </div>

        <div class="menu-panel menu-panel-hidden" id="menu-panel-options">
          <button class="menu-btn" id="btn-toggle-sound">Sound: On</button>
          <button class="menu-btn menu-btn-secondary" id="btn-back">Back</button>
        </div>

        <p class="menu-hint">WASD / Arrows to steer &nbsp;·&nbsp; Shift or Space to boost</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
